name: Baseline Checks

on:
  pull_request:
  push:
    branches: [master]

jobs:
  baseline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            extension/package-lock.json
            web-portal/package-lock.json

      - name: Install root deps
        run: npm ci

      - name: Install extension deps
        run: npm ci
        working-directory: extension

      - name: Install web-portal deps
        run: npm ci
        working-directory: web-portal

      - name: Extension lint
        run: npm run extension:lint

      - name: Web portal type-check
        run: npm run type-check
        working-directory: web-portal
